<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Car Controller</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        button { width: 100px; height: 100px; font-size: 20px; margin: 10px; cursor: pointer; }
        #status { color: red; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>ESP32 Car Control</h1>
    <div id="status">Disconnected</div>
    <button onclick="connect()">CONNECT</button>
    <br>
    <button onclick="sendCommand('F')">FORWARD</button><br>
    <button onclick="sendCommand('L')">LEFT</button>
    <button onclick="sendCommand('S')">STOP</button>
    <button onclick="sendCommand('R')">RIGHT</button><br>
    <button onclick="sendCommand('B')">BACK</button>

    <script>
        let characteristic;
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const CHAR_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CAR_CONTROL' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                document.getElementById('status').innerText = "Connected";
                document.getElementById('status').style.color = "green";
            } catch (err) {
                alert("Connection failed: " + err);
            }
        }

        async function sendCommand(cmd) {
            if (!characteristic) return alert("Connect first!");
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(cmd));
        }
    </script>
</body>
</html>
