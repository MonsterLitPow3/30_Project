<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>蓝牙小车控制器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f0f0;padding:20px;}
.box{max-width:400px;margin:0 auto;}
.btn{
  width:28%;height:65px;margin:6px;
  font-size:17px;border:0;border-radius:12px;
  background:#222;color:#fff;
  touch-action:none;
}
.row{display:flex;justify-content:center;flex-wrap:wrap;}
.tip{text-align:center;margin-bottom:15px;color:#666;}
</style>
</head>
<body>
<div class="box">
  <div class="tip">点击连接蓝牙 CAR_CONTROL</div>

  <div class="row">
    <button class="btn" data-cmd="F">前进</button>
  </div>
  <div class="row">
    <button class="btn" data-cmd="L">左转</button>
    <button class="btn" data-cmd="S">停止</button>
    <button class="btn" data-cmd="R">右转</button>
  </div>
  <div class="row">
    <button class="btn" data-cmd="B">后退</button>
  </div>
  <div class="row" style="margin-top:10px;">
    <button class="btn" data-cmd="C">顺时针</button>
    <button class="btn" data-cmd="A">逆时针</button>
  </div>
</div>

<script>
let bleChar = null;
const BLE_NAME = "CAR_CONTROL";
const SERV_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
const CHAR_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

async function connectBLE(){
  try{
    const dev = await navigator.bluetooth.requestDevice({
      filters:[{name:BLE_NAME}],
      optionalServices:[SERV_UUID]
    });
    const server = await dev.gatt.connect();
    const service = await server.getPrimaryService(SERV_UUID);
    bleChar = await service.getCharacteristic(CHAR_UUID);
    alert("蓝牙连接成功，可以控制小车");
  }catch(e){
    console.log(e);
    alert("连接失败，请手动打开蓝牙 & 定位");
  }
}

async function send(c){
  if(!bleChar)return;
  const buf = new TextEncoder().encode(c);
  await bleChar.writeValue(buf);
}

document.querySelectorAll(".btn").forEach(btn=>{
  let t = null;
  const cmd = btn.dataset.cmd;

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    send(cmd);
    t = setInterval(()=>send(cmd),180);
  });
  btn.addEventListener("mousedown",()=>{
    send(cmd);
    t = setInterval(()=>send(cmd),180);
  });

  function stop(){
    clearInterval(t);
    send("S");
  }
  btn.addEventListener("touchend",stop);
  btn.addEventListener("mouseup",stop);
  btn.addEventListener("mouseleave",stop);
});

connectBLE();
</script>
</body>
</html>
