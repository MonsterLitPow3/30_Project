<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dual-Mode Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            margin-bottom: 12px;
        }

        #status {
            font-size: 15px;
            font-weight: bold;
            margin: 10px 0 25px;
            color: #e53935;
        }

        /* Mode Buttons */
        .mode-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            height: 50px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .ble-btn {
            background: #000000;
            color: white;
        }

        .wifi-btn {
            background: #f2f2f2;
            color: #666;
            cursor: default;
        }

        .ble-btn:active {
            background: #333;
        }

        /* Control Panel */
        .control-panel {
            display: none;
            margin-top: 20px;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }

        .control-btn:active {
            background: #555;
            transform: scale(0.96);
        }

        .stop-btn {
            background: #e53935 !important;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .stop-btn:active {
            background: #c62828 !important;
        }

        /* WiFi Tip */
        #wifi-tip {
            display: none;
            color: #444;
            font-size: 14px;
            margin: 15px 0;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">Smart Car Controller</h1>
        <div id="status">Disconnected</div>

        <!-- Connection Mode -->
        <div id="mode-select" class="mode-group">
            <button class="mode-btn ble-btn" onclick="startBLE()">BLE (Bluetooth)</button>
            <button class="mode-btn wifi-btn" onclick="showWifiTip()">Wi-Fi (Unsupported)</button>
        </div>

        <!-- WiFi Tip -->
        <div id="wifi-tip">
            Wi-Fi mode is currently <b>not supported</b> on iOS devices.<br>
            Please use BLE mode to control the car.
        </div>

        <!-- 7 Control Buttons -->
        <div id="controls" class="control-panel">
            <div class="btn-grid">
                <div class="row">
                    <button class="control-btn" onclick="sendCmd('F')">F</button>
                </div>
                <div class="row">
                    <button class="control-btn" onclick="sendCmd('L')">L</button>
                    <button class="control-btn stop-btn" onclick="sendCmd('S')">STOP</button>
                    <button class="control-btn" onclick="sendCmd('R')">R</button>
                </div>
                <div class="row">
                    <button class="control-btn" onclick="sendCmd('B')">B</button>
                </div>
                <div class="row">
                    <button class="control-btn" onclick="sendCmd('A')">CCW</button>
                    <button class="control-btn" onclick="sendCmd('C')">CW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let characteristic;
        let mode = "";

        // Show WiFi Unsupported Tip
        function showWifiTip() {
            document.getElementById('wifi-tip').style.display = 'block';
        }

        // BLE Connection
        async function startBLE() {
            if (!navigator.bluetooth) {
                alert("Bluetooth is not supported in this browser. Use Chrome / Edge.");
                return;
            }
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CAR_CONTROL' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

                mode = "BLE";
                document.getElementById('status').innerText = "Connected: BLE";
                document.getElementById('status').style.color = "#2e7d32";
                document.getElementById('mode-select').style.display = 'none';
                document.getElementById('wifi-tip').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
            } catch (e) {
                alert("BLE Connection Failed: " + e.message);
            }
        }

        // Universal Command Sender
        async function sendCmd(cmd) {
            if (mode !== "BLE") {
                alert("Please connect via BLE first!");
                return;
            }

            try {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(cmd));
                console.log("Sent:", cmd);
            } catch (e) {
                console.log("Send failed:", e);
            }
        }
    </script>
</body>
</html>
