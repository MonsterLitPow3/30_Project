<script>
    let characteristic = null;
    let isPetMode = false;
    let rssiInterval = null;

    async function startBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CAR_CONTROL' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

            // Start listening for notifications (RSSI)
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleRSSI);

            document.getElementById('status').innerText = 'Connected';
            document.getElementById('status').style.color = 'green';
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('modeSelect').style.display = 'block';

        } catch (e) {
            alert('Connection failed: ' + e.message);
        }
    }

    function handleRSSI(event) {
        const value = new TextDecoder().decode(event.target.value);
        const rssi = parseInt(value);

        if (!isNaN(rssi) && isPetMode) {
            document.getElementById('rssiValue').innerText = `Current RSSI value: ${rssi} dBm`;
        }
    }

    function sendCmd(cmd) {
        if (!characteristic) return;
        characteristic.writeValue(new TextEncoder().encode(cmd));
    }

    // Bind buttons (same as before)
    function bindButtons() {
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                btn.classList.add('pressed');
                sendCmd(btn.dataset.cmd);
            });
            btn.addEventListener('pointerup', (e) => {
                e.preventDefault();
                document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('pressed'));
                sendCmd('S');
            });
        });
    }

    function enterController() {
        isPetMode = false;
        document.getElementById('modeSelect').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        bindButtons();
    }

    function enterPet() {
        isPetMode = true;
        document.getElementById('modeSelect').style.display = 'none';
        document.getElementById('petMode').style.display = 'block';
        
        // Show RSSI display
        document.getElementById('petMode').innerHTML = `
            <p class="pet-text">🐾 Pet Mode Active</p>
            <p id="rssiValue" style="font-size: 18px; margin-top: 20px; color: #007AFF;">
                Current RSSI value: -- dBm
            </p>
        `;
    }

    // Initialize
    bindButtons();
</script>
