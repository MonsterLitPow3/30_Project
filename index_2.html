<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
            color: #222;
        }

        #status {
            font-size: 16px;
            font-weight: bold;
            color: red;
            margin-bottom: 30px;
        }

        .connect-btn {
            width: 100%;
            height: 55px;
            border-radius: 12px;
            border: none;
            background: #007AFF;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .connect-btn:active {
            background: #0062CC;
        }

        .control-panel {
            display: none;
            margin-top: 20px;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 75px;
            height: 75px;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
            font-size: 18px;
            font-weight: bold;
            transition: 0.15s;
            user-select: none;
        }

        .control-btn.pressed {
            background: #007AFF !important;
            transform: scale(0.92);
        }

        .stop-btn {
            background: #FF3B30 !important;
        }

    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">Smart Car Control</h1>
        <div id="status">Disconnected</div>

        <button class="connect-btn" id="connectBtn" onclick="startBLE()">Connect BLE</button>

        <div class="control-panel" id="controls">
            <div class="btn-grid">
                <div class="row">
                    <button class="control-btn" data-cmd="F">FORWARD</button>
                </div>
                <div class="row">
                    <button class="control-btn" data-cmd="L">LEFT</button>
                    <button class="control-btn stop-btn" data-cmd="S">STOP</button>
                    <button class="control-btn" data-cmd="R">RIGHT</button>
                </div>
                <div class="row">
                    <button class="control-btn" data-cmd="B">BACKWARD</button>
                </div>
                <div class="row">
                    <button class="control-btn" data-cmd="A">CCW</button>
                    <button class="control-btn" data-cmd="C">CW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let characteristic = null;
        let currentCmd = null;
        let isHolding = false;

        const buttons = document.querySelectorAll('.control-btn');

        // BLE 连接
        async function startBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'CAR_CONTROL' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

                document.getElementById('status').innerText = "Connected";
                document.getElementById('status').style.color = "green";
                document.getElementById('connectBtn').style.display = "none";
                document.getElementById('controls').style.display = "block";
            } catch (e) {
                alert("Failed: " + e.message);
            }
        }

        // 发送指令
        async function sendCmd(cmd) {
            if (!characteristic) return;
            try {
                await characteristic.writeValue(new TextEncoder().encode(cmd));
            } catch (e) {
                console.log("Send error");
            }
        }

        // 按钮长按逻辑
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', start);
            btn.addEventListener('touchstart', start);

            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
            btn.addEventListener('touchend', stop);
        });

        function start(e) {
            e.preventDefault();
            const cmd = this.dataset.cmd;
            isHolding = true;
            currentCmd = cmd;
            this.classList.add('pressed');
            sendCmd(cmd);
        }

        function stop(e) {
            e.preventDefault();
            isHolding = false;
            currentCmd = null;
            buttons.forEach(b => b.classList.remove('pressed'));
            sendCmd('S');
        }
    </script>
</body>
</html>
