<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Car Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            padding: 24px;
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        #status {
            font-size: 14px;
            font-weight: bold;
            color: #FF3B30;
            margin-bottom: 20px;
        }

        #status.connected {
            color: #34C759;
        }

        .connect-btn {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            border: none;
            background: #007AFF;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.2s;
        }

        .connect-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .mode-select {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .mode-btn {
            width: 100%;
            height: 60px;
            border-radius: 14px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .mode-btn.controller {
            background: #007AFF;
        }

        .mode-btn.pet {
            background: #FF9500;
        }

        .mode-btn:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        .control-panel {
            display: none;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            border: none;
            background: #1c1c1e;
            color: white;
            font-size: 26px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ctrl-btn.pressed {
            background: #007AFF;
            transform: scale(0.9);
        }

        .ctrl-btn.stop {
            background: #FF3B30;
            font-size: 18px;
        }

        .back-btn {
            width: 100%;
            height: 44px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: white;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
        }

        .pet-panel {
            display: none;
        }

        .pet-text {
            font-size: 20px;
            color: #FF9500;
            margin: 16px 0;
            font-weight: bold;
        }

        .rssi-text {
            font-size: 16px;
            color: #555;
            margin: 8px 0;
        }

        .call-btn {
            width: 100%;
            height: 56px;
            border-radius: 14px;
            border: none;
            background: #34C759;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Smart Car</h1>
        <div id="status">Disconnected</div>

        <button class="connect-btn" id="connectBtn" onclick="startBLE()">
            Connect BLE
        </button>

        <!-- 模式选择 -->
        <div class="mode-select" id="modeSelect">
            <button class="mode-btn controller" onclick="showController()">
                Controller Mode
            </button>
            <button class="mode-btn pet" onclick="showPet()">
                Pet Follow Mode
            </button>
        </div>

        <!-- 控制器 -->
        <div class="control-panel" id="controlPanel">
            <div class="btn-grid">
                <div class="row">
                    <button class="ctrl-btn" data-cmd="F">⬆</button>
                </div>
                <div class="row">
                    <button class="ctrl-btn" data-cmd="L">⬅</button>
                    <button class="ctrl-btn stop" data-cmd="S">STOP</button>
                    <button class="ctrl-btn" data-cmd="R">➡</button>
                </div>
                <div class="row">
                    <button class="ctrl-btn" data-cmd="B">⬇</button>
                </div>
                <div class="row">
                    <button class="ctrl-btn" data-cmd="A">↺</button>
                    <button class="ctrl-btn" data-cmd="C">↻</button>
                </div>
            </div>
            <button class="back-btn" onclick="goBack()">Back</button>
        </div>

        <!-- Pet 模式 -->
        <div class="pet-panel" id="petPanel">
            <p class="pet-text">Pet Auto Follow</p>
            <p class="rssi-text" id="rssiDisplay">RSSI: --</p>
            <p style="color:#999;font-size:13px;">Searching for you...</p>
            <button class="call-btn" onclick="callCar()">Call Car To Me</button>
            <button class="back-btn" onclick="goBack()">Back</button>
        </div>
    </div>

<script>
    let bleChar = null;
    let bleDevice = null;
    let sendQueue = Promise.resolve();
    let rssiTimer = null;

    const statusDiv = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const modeSelect = document.getElementById('modeSelect');
    const controlPanel = document.getElementById('controlPanel');
    const petPanel = document.getElementById('petPanel');
    const rssiDisplay = document.getElementById('rssiDisplay');

    // ============ BLE 连接 ============
    async function startBLE() {
        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CAR_CONTROL' }],
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            bleChar = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

            statusDiv.textContent = 'Connected';
            statusDiv.classList.add('connected');
            connectBtn.classList.add('hidden');
            modeSelect.style.display = 'flex';

        } catch (e) {
            alert('Connection failed: ' + e.message);
        }
    }

    // ============ 发送命令 ============
    function queueWrite(cmd) {
        if (!bleChar) return;
        sendQueue = sendQueue.then(() =>
            bleChar.writeValue(new TextEncoder().encode(cmd))
        ).catch(() => {});
    }

    function sendCmd(cmd) {
        if (!bleChar) return;
        queueWrite(cmd + '\n');  // 👈 换行符结尾
    }

    // ============ 模式切换 ============
    function showController() {
        modeSelect.style.display = 'none';
        controlPanel.style.display = 'block';
        bindButtons();
        stopRSSI();
    }

    function showPet() {
        modeSelect.style.display = 'none';
        petPanel.style.display = 'block';
        sendCmd('0');  // 进入 Pet 模式
        startRSSI();   // 开始发送 RSSI
    }

    function goBack() {
        sendCmd('S');  // 停止
        sendCmd('1');  // 退出 Pet 模式
        controlPanel.style.display = 'none';
        petPanel.style.display = 'none';
        modeSelect.style.display = 'flex';
        stopRSSI();
    }

    // ============ 控制器按钮 ============
    function bindButtons() {
        const btns = document.querySelectorAll('.ctrl-btn');
        btns.forEach(btn => {
            btn.addEventListener('pointerdown', onPress);
            btn.addEventListener('pointerup', onRelease);
            btn.addEventListener('pointerleave', onRelease);
            btn.addEventListener('pointercancel', onRelease);
        });
    }

    function onPress(e) {
        e.preventDefault();
        const cmd = this.dataset.cmd;
        this.classList.add('pressed');
        sendCmd(cmd);
    }

    function onRelease(e) {
        e.preventDefault();
        document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('pressed'));
        sendCmd('S');
    }

    // ============ RSSI 发送 ============
    function startRSSI() {
        stopRSSI();
        rssiTimer = setInterval(() => {
            if (bleDevice && bleChar) {
                let rssi = bleDevice.gatt?.connected ? (bleDevice.rssi ?? -60) : -60;
                rssiDisplay.textContent = 'RSSI: ' + rssi;
                sendCmd('R' + rssi);
            }
        }, 200);
    }

    function stopRSSI() {
        if (rssiTimer) {
            clearInterval(rssiTimer);
            rssiTimer = null;
        }
    }

    // ============ 召唤 ============
    function callCar() {
        sendCmd('0');  // 重新触发搜索
        // 闪一下按钮
        const btn = document.querySelector('.call-btn');
        btn.style.background = '#FF9500';
        setTimeout(() => btn.style.background = '#34C759', 200);
    }
</script>
</body>
</html>
